name: Bug report
description: Report a reproducible defect
title: "bug: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction command or payload
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Logs / output / environment
    validations:
      required: true
