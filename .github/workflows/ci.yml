name: BIVE CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default: every job opts in to what it needs.
permissions:
  contents: read

# Never write .pyc into the checkout: the first release gate (repo-clean) fails
# on stray bytecode, and the editable install step runs before it.
env:
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  verify-release:
    name: Verify release gate (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip==26.1.2 setuptools==78.1.1 wheel==0.46.2
          pip install --constraint requirements/constraints.txt -e '.[dev,api,security]'
      - name: Verify release gate
        run: make verify-release
      - name: Dependency audit
        run: make dependency-audit
      - name: License audit
        run: make license-audit
      - name: Upload verification artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: verification-${{ matrix.python-version }}
          path: |
            artifacts/security/*.json
            artifacts/verification/*.json
            artifacts/benchmarks/*.json
            artifacts/verification/VERIFY_RELEASE.log
            ARTIFACT_MANIFEST.json
            PRODUCT_SYSTEM_INDEX.json
            docs/openapi.json

  determinism:
    name: Determinism calibration
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip==26.1.2 setuptools==78.1.1 wheel==0.46.2
          pip install --constraint requirements/constraints.txt -e .
      - name: Stress the structural hash across rebuilds and hash seeds
        run: make determinism-stress

  dependency-review:
    name: Dependency review
    # Defence-in-depth, two activation paths:
    #   - pull_request: the merge gate (action auto-derives base/head from the PR).
    #   - push to main: closes the direct-push bypass — a commit that lands on main
    #     without a PR is still diffed against its parent. Skip the synthetic
    #     all-zero `before` SHA that GitHub sends on branch creation / first push,
    #     where there is no parent to compare against.
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' &&
       github.event.before != '0000000000000000000000000000000000000000')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          # On push the action has no PR context, so the diff endpoints must be
          # supplied explicitly. On pull_request these resolve to '' (falsy) and
          # the action falls back to the PR's own base/head.
          base-ref: ${{ github.event_name == 'push' && github.event.before || '' }}
          head-ref: ${{ github.event_name == 'push' && github.sha || '' }}
          fail-on-severity: high
          comment-summary-in-pr: on-failure
          deny-licenses: AGPL-1.0-only, AGPL-1.0-or-later, AGPL-3.0-only, AGPL-3.0-or-later

  # NOTE: OpenSSF Scorecard lives in its own workflow (.github/workflows/scorecard.yml).
  # Its publish endpoint requires a trusted workflow with no top-level `env:`/`defaults:`,
  # which this CI workflow legitimately has (PYTHONDONTWRITEBYTECODE), so it cannot run here.
