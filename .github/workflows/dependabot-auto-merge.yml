name: Dependabot auto-merge

# Enable auto-merge for low-risk Dependabot updates. GitHub still holds the
# merge until every required status check (branch protection) is green, so this
# never bypasses CI — it only removes the manual click for patch/minor bumps.
# Major version bumps are left for human review.

on: pull_request

permissions:
  contents: read

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
      - name: Enable auto-merge for patch and minor updates
        if: steps.meta.outputs.update-type == 'version-update:semver-patch' || steps.meta.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Flag major updates for manual review
        if: steps.meta.outputs.update-type == 'version-update:semver-major'
        run: gh pr comment "$PR_URL" --body "🛑 Major version bump (${{ steps.meta.outputs.dependency-names }}) — held for manual review; not auto-merged."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
