name: Manifest sync

# Dependabot edits manifest-pinned files (requirements/*, constraints/*,
# .github/**), but cannot regenerate ARTIFACT_MANIFEST.json, so the manifest
# gate always fails on its PRs. This bot regenerates the manifest + derived
# artifacts on Dependabot PRs and commits the result back to the PR branch,
# which then lets the normal required checks go green and auto-merge fire.
#
# Uses pull_request_target so the GITHUB_TOKEN has write access. Only the base
# (trusted) copy of this workflow runs, and it is gated to dependabot[bot]; the
# regen scripts only hash files and read pyproject/requirements.

on:
  pull_request_target:

permissions:
  contents: read

jobs:
  sync:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0080882f6c36860b6ba35c610c98ce87d4e2f26f # v2.10.2
        with:
          egress-policy: audit
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.12'
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,api,security]'
      - name: Regenerate manifest and derived artifacts
        run: |
          export PYTHONPATH=src
          python scripts/validate_dependency_contracts.py || true
          python scripts/dynamic_environment_probe.py
          python scripts/generate_manifest.py
          python scripts/generate_evidence_bundle.py
      - name: Commit manifest sync if changed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add ARTIFACT_MANIFEST.json REPO_TREE.txt PRODUCT_SYSTEM_INDEX.json artifacts/
            git commit -m "ci: sync manifest for dependabot update"
            git push
          else
            echo "manifest already in sync"
          fi
