name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build distribution + SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
          cache: pip
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip setuptools==69.5.1 wheel==0.43.0
          python -m pip install -r requirements/dev.txt -r requirements/security.txt
      - name: Build wheel + sdist
        run: python -m build
      - name: Generate CycloneDX SBOM
        run: |
          python -m pip install --no-build-isolation -r requirements/core.txt -r requirements/api.txt -e .
          cyclonedx-py environment --output-format JSON --outfile dist/bive.cdx.json
      - name: Compute artifact hashes
        id: hash
        run: |
          cd dist
          echo "hashes=$(sha256sum *.whl *.tar.gz | base64 -w0)" >> "$GITHUB_OUTPUT"
          sha256sum *.whl *.tar.gz | tee SHA256SUMS
      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  provenance:
    name: Attest build provenance
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write       # attach assets to the GitHub Release
      id-token: write        # OIDC for the attestation signature
      attestations: write    # record the SLSA provenance attestation
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: 'dist/*.whl, dist/*.tar.gz'
      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/bive.cdx.json
            dist/SHA256SUMS
          generate_release_notes: true

  pypi-publish:
    name: Publish to PyPI (Trusted Publishing)
    needs: build
    if: startsWith(github.ref, 'refs/tags/') && vars.PYPI_PUBLISH == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/bive
    permissions:
      id-token: write  # OIDC — no long-lived API token
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Remove non-distribution files
        run: rm -f dist/bive.cdx.json dist/SHA256SUMS
      - name: Publish
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
