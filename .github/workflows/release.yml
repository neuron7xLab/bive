name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build distribution + SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
          cache: pip
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build cyclonedx-bom
      - name: Build wheel + sdist
        run: python -m build
      - name: Generate CycloneDX SBOM
        run: |
          pip install --constraint requirements/constraints.txt -e '.[api,ml]'
          cyclonedx-py environment --output-format JSON --outfile dist/bive.cdx.json
      - name: Compute artifact hashes
        id: hash
        run: |
          cd dist
          echo "hashes=$(sha256sum *.whl *.tar.gz | base64 -w0)" >> "$GITHUB_OUTPUT"
          sha256sum *.whl *.tar.gz | tee SHA256SUMS
      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/

  provenance:
    name: Attest build provenance
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write       # attach assets to the GitHub Release
      id-token: write        # OIDC for the attestation signature
      attestations: write    # record the SLSA provenance attestation
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: 'dist/*.whl, dist/*.tar.gz'
      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/bive.cdx.json
            dist/SHA256SUMS
          generate_release_notes: true

  pypi-publish:
    name: Publish to PyPI (Trusted Publishing)
    needs: build
    if: startsWith(github.ref, 'refs/tags/') && vars.PYPI_PUBLISH == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/bive
    permissions:
      id-token: write  # OIDC — no long-lived API token
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/
      - name: Remove non-distribution files
        run: rm -f dist/bive.cdx.json dist/SHA256SUMS
      - name: Publish
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
