name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Build distribution + SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0080882f6c36860b6ba35c610c98ce87d4e2f26f # v2.10.2
        with:
          egress-policy: audit
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.12'
          cache: pip
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build cyclonedx-bom
      - name: Build wheel + sdist
        run: python -m build
      - name: Generate CycloneDX SBOM
        run: |
          pip install -e '.[api,ml]'
          cyclonedx-py environment --output-format JSON --outfile dist/bive.cdx.json
      - name: Compute artifact hashes
        id: hash
        run: |
          cd dist
          echo "hashes=$(sha256sum *.whl *.tar.gz | base64 -w0)" >> "$GITHUB_OUTPUT"
          sha256sum *.whl *.tar.gz | tee SHA256SUMS
      - name: Upload build artifacts
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: dist
          path: dist/

  provenance:
    name: Attest build provenance
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write       # attach assets to the GitHub Release
      id-token: write        # OIDC for the attestation signature
      attestations: write    # record the SLSA provenance attestation
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@0080882f6c36860b6ba35c610c98ce87d4e2f26f # v2.10.2
        with:
          egress-policy: audit
      - name: Download build artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: dist
          path: dist/
      - name: Attest build provenance
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v1.4.4
        with:
          subject-path: 'dist/*.whl, dist/*.tar.gz'
      - name: Publish GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/bive.cdx.json
            dist/SHA256SUMS
          generate_release_notes: true

  pypi-publish:
    name: Publish to PyPI (Trusted Publishing)
    needs: build
    if: startsWith(github.ref, 'refs/tags/') && vars.PYPI_PUBLISH == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/bive
    permissions:
      id-token: write  # OIDC — no long-lived API token
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: dist
          path: dist/
      - name: Remove non-distribution files
        run: rm -f dist/bive.cdx.json dist/SHA256SUMS
      - name: Publish
        uses: pypa/gh-action-pypi-publish@67339c736fd9354cd4f8cb0b744f2b82a74b5c70 # v1.12.3
